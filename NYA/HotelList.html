<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Hotel Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #18181b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen custom-scrollbar selection:bg-brand-500/30 selection:text-brand-500">
    
    <!-- Decorative Background Elements -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-brand-600/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/10 rounded-full blur-[120px]"></div>
    </div>

    <div class="max-w-6xl mx-auto p-6 md:p-10">
        <header class="mb-10 flex flex-col md:flex-row md:items-center justify-between gap-6">
            <div>
                <h1 class="text-4xl font-bold text-white tracking-tight flex items-center gap-3">
                    <span class="bg-gradient-to-br from-brand-400 to-brand-600 p-2.5 rounded-2xl shadow-lg shadow-brand-500/20">
                        <i class="fa-solid fa-hotel text-white text-2xl"></i>
                    </span>
                    Hotel <span class="text-brand-500">Listings</span>
                </h1>
                <p class="text-zinc-400 mt-2 text-lg">Manage your premium property portfolio</p>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-xl flex items-center gap-3">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-sm font-medium text-zinc-300" id="statsCount">0 Hotels Listed</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Form Sidebar -->
            <div class="lg:col-span-4">
                <div class="glass p-8 rounded-3xl border border-zinc-800 shadow-2xl sticky top-8">
                    <h2 class="text-xl font-semibold text-white mb-6 flex items-center gap-2">
                        <i class="fa-solid fa-plus-circle text-brand-500"></i>
                        <span id="formTitle">Add New Hotel</span>
                    </h2>
                    
                    <div class="space-y-5">
                        <div>
                            <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Hotel Name</label>
                            <input type="text" id="txtHotelName" placeholder="e.g. Grand Plaza"
                                   class="w-full bg-zinc-900/50 border border-zinc-800 focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 text-white px-4 py-3.5 rounded-2xl focus:outline-none transition-all placeholder:text-zinc-600">
                        </div>
                        
                        <div>
                            <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Location</label>
                            <input type="text" id="txtLocation" placeholder="City, Country"
                                   class="w-full bg-zinc-900/50 border border-zinc-800 focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 text-white px-4 py-3.5 rounded-2xl focus:outline-none transition-all placeholder:text-zinc-600">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Price/Night</label>
                                <div class="relative">
                                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500">$</span>
                                    <input type="number" id="txtPrice" placeholder="0.00"
                                           class="w-full bg-zinc-900/50 border border-zinc-800 focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 text-white pl-8 pr-4 py-3.5 rounded-2xl focus:outline-none transition-all placeholder:text-zinc-600">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Rating</label>
                                <select id="txtRating"
                                        class="w-full bg-zinc-900/50 border border-zinc-800 focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 text-white px-4 py-3.5 rounded-2xl focus:outline-none transition-all appearance-none">
                                    <option value="5">5 Stars</option>
                                    <option value="4">4 Stars</option>
                                    <option value="3">3 Stars</option>
                                    <option value="2">2 Stars</option>
                                    <option value="1">1 Star</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">Availability</label>
                            <select id="txtStatus"
                                    class="w-full bg-zinc-900/50 border border-zinc-800 focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 text-white px-4 py-3.5 rounded-2xl focus:outline-none transition-all appearance-none">
                                <option value="Available">Available</option>
                                <option value="Sold Out">Sold Out</option>
                            </select>
                        </div>

                        <div class="pt-4 flex flex-col gap-3">
                            <button id="btnSave"
                                    class="w-full py-4 bg-brand-600 hover:bg-brand-500 text-white rounded-2xl font-semibold transition-all transform active:scale-[0.98] shadow-lg shadow-brand-600/20 flex items-center justify-center gap-2">
                                <i class="fa-solid fa-save"></i>
                                <span id="btnSaveText">Save Property</span>
                            </button>
                            <button id="btnCancel"
                                    class="w-full py-4 bg-zinc-800/50 hover:bg-zinc-800 text-zinc-400 hover:text-white rounded-2xl font-semibold transition-all flex items-center justify-center gap-2">
                                <i class="fa-solid fa-xmark"></i>
                                Reset Form
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Table Section -->
            <div class="lg:col-span-8">
                <div class="glass rounded-3xl border border-zinc-800 overflow-hidden shadow-2xl">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="bg-zinc-900/50 border-b border-zinc-800">
                                    <th class="py-5 px-6 text-xs font-bold text-zinc-500 uppercase tracking-wider">Hotel Details</th>
                                    <th class="py-5 px-6 text-xs font-bold text-zinc-500 uppercase tracking-wider text-center">Rating</th>
                                    <th class="py-5 px-6 text-xs font-bold text-zinc-500 uppercase tracking-wider text-center">Status</th>
                                    <th class="py-5 px-6 text-xs font-bold text-zinc-500 uppercase tracking-wider text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="hotelTableBody" class="divide-y divide-zinc-800/50">
                                <!-- Dynamic Content -->
                            </tbody>
                        </table>
                    </div>
                    
                    <div id="emptyState" class="hidden py-20 flex flex-col items-center justify-center text-center px-6">
                        <div class="w-20 h-20 bg-zinc-900 rounded-full flex items-center justify-center mb-6">
                            <i class="fa-solid fa-hotel text-zinc-700 text-3xl"></i>
                        </div>
                        <h3 class="text-xl font-medium text-white mb-2">No Hotels Found</h3>
                        <p class="text-zinc-500 max-w-xs">Start building your portfolio by adding your first hotel property.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-8 right-8 translate-y-20 opacity-0 transition-all duration-500 z-50">
        <div class="bg-zinc-900 border border-zinc-800 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4">
            <div id="toastIcon" class="w-10 h-10 rounded-full flex items-center justify-center"></div>
            <div>
                <p id="toastTitle" class="text-white font-semibold text-sm"></p>
                <p id="toastMsg" class="text-zinc-400 text-xs"></p>
            </div>
        </div>
    </div>

    <script src="js/jquery-4.0.0.min.js"></script>
    <script>
        let editHotelId = null;

        function showToast(title, msg, type = 'success') {
            const toast = $('#toast');
            const icon = $('#toastIcon');
            
            if (type === 'success') {
                icon.html('<i class="fa-solid fa-check text-emerald-500"></i>').addClass('bg-emerald-500/10').removeClass('bg-red-500/10');
            } else {
                icon.html('<i class="fa-solid fa-xmark text-red-500"></i>').addClass('bg-red-500/10').removeClass('bg-emerald-500/10');
            }

            $('#toastTitle').text(title);
            $('#toastMsg').text(msg);
            
            toast.removeClass('translate-y-20 opacity-0').addClass('translate-y-0 opacity-100');
            setTimeout(() => {
                toast.addClass('translate-y-20 opacity-0').removeClass('translate-y-0 opacity-100');
            }, 3000);
        }

        function loadHotels() {
            let hotels = JSON.parse(localStorage.getItem('Hotels') || '[]');
            let rows = '';

            $('#statsCount').text(`${hotels.length} Hotel${hotels.length !== 1 ? 's' : ''} Listed`);

            if (hotels.length === 0) {
                $('#emptyState').removeClass('hidden');
                $('#hotelTableBody').html('');
                return;
            }

            $('#emptyState').addClass('hidden');

            hotels.forEach((hotel) => {
                const statusClass = hotel.status === "Available" 
                    ? "bg-emerald-500/10 text-emerald-500 border border-emerald-500/20" 
                    : "bg-red-500/10 text-red-500 border border-red-500/20";

                let stars = '';
                for(let i=0; i<5; i++) {
                    stars += `<i class="fa-solid fa-star text-xs ${i < hotel.rating ? 'text-amber-400' : 'text-zinc-700'}"></i>`;
                }

                rows += `
                    <tr class="group hover:bg-zinc-800/30 transition-all duration-300">
                        <td class="py-5 px-6">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-zinc-900 rounded-xl flex items-center justify-center border border-zinc-800 group-hover:border-brand-500/50 transition-colors">
                                    <i class="fa-solid fa-building text-brand-500"></i>
                                </div>
                                <div>
                                    <p class="font-semibold text-white group-hover:text-brand-400 transition-colors">${hotel.name}</p>
                                    <p class="text-zinc-500 text-xs flex items-center gap-1">
                                        <i class="fa-solid fa-location-dot text-[10px]"></i> ${hotel.location}
                                    </p>
                                    <p class="text-brand-500 font-bold text-sm mt-1">$${parseFloat(hotel.price).toLocaleString()}<span class="text-zinc-600 font-normal text-[10px]"> /night</span></p>
                                </div>
                            </div>
                        </td>
                        <td class="py-5 px-6 text-center">
                            <div class="flex items-center justify-center gap-0.5">
                                ${stars}
                            </div>
                        </td>
                        <td class="py-5 px-6 text-center">
                            <span class="px-3 py-1 rounded-lg text-[10px] font-bold uppercase tracking-wider ${statusClass}">
                                ${hotel.status}
                            </span>
                        </td>
                        <td class="py-5 px-6 text-right">
                            <div class="flex items-center justify-end gap-2">
                                <button onclick="editHotel('${hotel.id}')" 
                                        class="w-9 h-9 flex items-center justify-center rounded-xl bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-amber-400 hover:border-amber-400/50 transition-all">
                                    <i class="fa-solid fa-pen-to-square text-sm"></i>
                                </button>
                                <button onclick="deleteHotel('${hotel.id}')" 
                                        class="w-9 h-9 flex items-center justify-center rounded-xl bg-zinc-900 border border-zinc-800 text-zinc-400 hover:text-red-400 hover:border-red-400/50 transition-all">
                                    <i class="fa-solid fa-trash-can text-sm"></i>
                                </button>
                            </div>
                        </td>
                    </tr>`;
            });

            $('#hotelTableBody').html(rows);
        }

        function editHotel(id) {
            let hotels = JSON.parse(localStorage.getItem('Hotels') || '[]');
            let hotel = hotels.find(h => h.id === id);

            if (hotel) {
                $('#txtHotelName').val(hotel.name);
                $('#txtLocation').val(hotel.location);
                $('#txtPrice').val(hotel.price);
                $('#txtRating').val(hotel.rating);
                $('#txtStatus').val(hotel.status);
                
                editHotelId = id;
                $('#formTitle').text('Edit Hotel');
                $('#btnSaveText').text('Update Property');
                $('#txtHotelName').focus();
                
                // Scroll to form on mobile
                if (window.innerWidth < 1024) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }
        }

        $('#btnCancel').click(function () {
            clearForm();
        });

        $('#btnSave').click(function () {
            const name = $('#txtHotelName').val().trim();
            const location = $('#txtLocation').val().trim();
            const price = $('#txtPrice').val();
            const rating = $('#txtRating').val();
            const status = $('#txtStatus').val();

            if (!name || !location || !price) {
                showToast("Missing Info", "Please fill in all required fields", "error");
                return;
            }

            if (editHotelId) {
                updateHotel(name, location, price, rating, status);
            } else {
                insertHotel(name, location, price, rating, status);
            }

            clearForm();
            loadHotels();
        });

        function insertHotel(name, location, price, rating, status) {
            let hotels = JSON.parse(localStorage.getItem('Hotels') || '[]');

            hotels.push({
                id: crypto.randomUUID(),
                name: name,
                location: location,
                price: price,
                rating: parseInt(rating),
                status: status
            });

            localStorage.setItem('Hotels', JSON.stringify(hotels));
            showToast("Hotel Added", `${name} has been added to your list.`);
        }

        function updateHotel(name, location, price, rating, status) {
            let hotels = JSON.parse(localStorage.getItem('Hotels') || '[]');
            let index = hotels.findIndex(h => h.id === editHotelId);

            if (index !== -1) {
                hotels[index].name = name;
                hotels[index].location = location;
                hotels[index].price = price;
                hotels[index].rating = parseInt(rating);
                hotels[index].status = status;
                
                localStorage.setItem('Hotels', JSON.stringify(hotels));
                showToast("Hotel Updated", `${name} has been successfully updated.`);
            }
        }

        function deleteHotel(id) {
            if (!confirm("Are you sure you want to remove this property?")) return;

            let hotels = JSON.parse(localStorage.getItem('Hotels') || '[]');
            const hotelName = hotels.find(h => h.id === id)?.name || "Hotel";
            
            hotels = hotels.filter(h => h.id !== id);
            localStorage.setItem('Hotels', JSON.stringify(hotels));
            showToast("Hotel Removed", `${hotelName} has been deleted.`);
            loadHotels();
        }

        function clearForm() {
            $('#txtHotelName').val('');
            $('#txtLocation').val('');
            $('#txtPrice').val('');
            $('#txtRating').val('5');
            $('#txtStatus').val('Available');
            
            editHotelId = null;
            $('#formTitle').text('Add New Hotel');
            $('#btnSaveText').text('Save Property');
        }

        // Initialize
        $(document).ready(function() {
            // Check if jQuery loaded, if not use a fallback or wait
            if (typeof $ === 'undefined') {
                console.error('jQuery not loaded. Please ensure js/jquery-4.0.0.min.js exists.');
                // Add fallback to CDN for demonstration if local fails
                let script = document.createElement('script');
                script.src = "https://code.jquery.com/jquery-3.7.1.min.js";
                script.onload = () => { loadHotels(); };
                document.head.appendChild(script);
            } else {
                loadHotels();
            }
        });
    </script>
</body>
</html>
