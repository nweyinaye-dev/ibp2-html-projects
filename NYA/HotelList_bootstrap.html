<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Hotel Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --brand: #0ea5e9;
            --brand-dark: #0284c7;
        }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #09090b;
            color: #d4d4d8;
            min-height: 100vh;
        }

        /* Recreating the Decorative Background */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }
        .glow-1 { position: absolute; top: -10%; left: -10%; width: 40%; height: 40%; background: rgba(14, 165, 233, 0.1); border-radius: 50%; filter: blur(120px); }
        .glow-2 { position: absolute; bottom: -10%; right: -10%; width: 40%; height: 40%; background: rgba(147, 51, 234, 0.1); border-radius: 50%; filter: blur(120px); }

        /* The "Glass" Effect */
        .glass {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid #27272a;
            border-radius: 1.5rem;
        }

        /* Form Inputs Styling */
        .form-label-custom { font-size: 0.75rem; font-weight: 700; color: #71717a; text-transform: uppercase; letter-spacing: 0.05em; }
        .form-control, .form-select {
            background: rgba(15, 15, 15, 0.5);
            border: 1px solid #27272a;
            color: white;
            border-radius: 1rem;
            padding: 0.85rem 1rem;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(15, 15, 15, 0.8);
            border-color: var(--brand);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
            color: white;
        }

        /* Buttons */
        .btn-brand { background: var(--brand); color: white; border-radius: 1rem; font-weight: 600; padding: 1rem; transition: 0.2s; border: none; }
        .btn-brand:hover { background: var(--brand-dark); transform: scale(0.98); }
        .btn-reset { background: rgba(39, 39, 42, 0.5); color: #a1a1aa; border-radius: 1rem; padding: 1rem; border: none; }

        /* Table custom styling */
        .table { color: #d4d4d8; margin-bottom: 0; }
        .table thead th { background: rgba(24, 24, 27, 0.5); border-bottom: 1px solid #27272a; color: #71717a; font-size: 0.75rem; text-transform: uppercase; padding: 1.25rem; }
        .table tbody td { border-bottom: 1px solid rgba(39, 39, 42, 0.5); padding: 1.25rem; vertical-align: middle; }
        
        .hotel-icon-box {
            width: 48px; height: 48px; background: #18181b; border: 1px solid #27272a;
            display: flex; align-items: center; justify-content: center; border-radius: 0.75rem; color: var(--brand);
        }

        .status-badge { font-size: 10px; font-weight: 700; padding: 4px 12px; border-radius: 8px; text-transform: uppercase; }
        .status-available { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-sold { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>

    <div class="bg-glow">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>

    <div class="container py-5">
        <header class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5">
            <div>
                <h1 class="fw-bold text-white mb-0 d-flex align-items-center gap-3">
                    <span style="background: linear-gradient(135deg, #38bdf8, #0284c7); padding: 10px; border-radius: 15px;">
                        <i class="fa-solid fa-hotel text-white"></i>
                    </span>
                    Hotel <span style="color: var(--brand)">Listings</span>
                </h1>
                <p class="text-secondary mt-2 fs-5">Manage your premium property portfolio</p>
            </div>
            <div class="mt-3 mt-md-0">
                <div class="glass px-4 py-2 d-flex align-items-center gap-2" style="border-radius: 12px;">
                    <span class="spinner-grow spinner-grow-sm text-success"></span>
                    <span class="small fw-medium" id="statsCount">0 Hotels Listed</span>
                </div>
            </div>
        </header>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="glass p-4 sticky-top" style="top: 2rem;">
                    <h5 class="text-white fw-bold mb-4 d-flex align-items-center gap-2">
                        <i class="fa-solid fa-plus-circle text-info"></i>
                        <span id="formTitle">Add New Hotel</span>
                    </h5>
                    
                    <div class="mb-3">
                        <label class="form-label-custom">Hotel Name</label>
                        <input type="text" id="txtHotelName" class="form-control" placeholder="e.g. Grand Plaza">
                    </div>

                    <div class="mb-3">
                        <label class="form-label-custom">Location</label>
                        <input type="text" id="txtLocation" class="form-control" placeholder="City, Country">
                    </div>

                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="form-label-custom">Price/Night</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-end-0 text-secondary" style="border-color: #27272a;">$</span>
                                <input type="number" id="txtPrice" class="form-control border-start-0" placeholder="0.00">
                            </div>
                        </div>
                        <div class="col-6">
                            <label class="form-label-custom">Rating</label>
                            <select id="txtRating" class="form-select">
                                <option value="5">5 Stars</option>
                                <option value="4">4 Stars</option>
                                <option value="3">3 Stars</option>
                                <option value="2">2 Stars</option>
                                <option value="1">1 Star</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label-custom">Availability</label>
                        <select id="txtStatus" class="form-select">
                            <option value="Available">Available</option>
                            <option value="Sold Out">Sold Out</option>
                        </select>
                    </div>

                    <div class="d-grid gap-3">
                        <button id="btnSave" class="btn btn-brand">
                            <i class="fa-solid fa-save me-2"></i><span id="btnSaveText">Save Property</span>
                        </button>
                        <button id="btnCancel" class="btn btn-reset">
                            <i class="fa-solid fa-xmark me-2"></i>Reset Form
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="glass overflow-hidden shadow-lg">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Hotel Details</th>
                                    <th class="text-center">Rating</th>
                                    <th class="text-center">Status</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="hotelTableBody">
                                </tbody>
                        </table>
                    </div>
                    <div id="emptyState" class="text-center py-5 d-none">
                        <i class="fa-solid fa-hotel fs-1 text-secondary opacity-25 mb-3"></i>
                        <h5 class="text-white">No Hotels Found</h5>
                        <p class="text-secondary small">Start by adding your first hotel property.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        // JS logic remains same as original for functionality
        function loadHotels() {
            let hotels = JSON.parse(localStorage.getItem('Hotels') || '[]');
            let rows = '';
            $('#statsCount').text(`${hotels.length} Hotel${hotels.length !== 1 ? 's' : ''} Listed`);

            if (hotels.length === 0) {
                $('#emptyState').removeClass('d-none');
                $('#hotelTableBody').html('');
                return;
            }
            $('#emptyState').addClass('d-none');

            hotels.forEach((hotel) => {
                const statusCls = hotel.status === "Available" ? "status-available" : "status-sold";
                let stars = '';
                for(let i=0; i<5; i++) {
                    stars += `<i class="fa-solid fa-star" style="font-size: 10px; color: ${i < hotel.rating ? '#fbbf24' : '#3f3f46'}"></i>`;
                }

                rows += `
                    <tr>
                        <td>
                            <div class="d-flex align-items-center gap-3">
                                <div class="hotel-icon-box"><i class="fa-solid fa-building"></i></div>
                                <div>
                                    <div class="fw-bold text-white">${hotel.name}</div>
                                    <div class="small text-secondary"><i class="fa-solid fa-location-dot me-1"></i>${hotel.location}</div>
                                    <div class="fw-bold mt-1" style="color: var(--brand); font-size: 0.9rem;">$${parseFloat(hotel.price).toLocaleString()} <span class="text-secondary fw-normal" style="font-size: 0.7rem;">/night</span></div>
                                </div>
                            </div>
                        </td>
                        <td class="text-center">${stars}</td>
                        <td class="text-center"><span class="status-badge ${statusCls}">${hotel.status}</span></td>
                        <td class="text-end">
                            <button onclick="editHotel('${hotel.id}')" class="btn btn-sm btn-dark border-secondary me-1"><i class="fa-solid fa-pen-to-square text-warning"></i></button>
                            <button onclick="deleteHotel('${hotel.id}')" class="btn btn-sm btn-dark border-secondary"><i class="fa-solid fa-trash-can text-danger"></i></button>
                        </td>
                    </tr>`;
            });
            $('#hotelTableBody').html(rows);
        }

        // ... [Include your other JS functions: editHotel, deleteHotel, insertHotel, etc. from previous response] ...
        // Re-adding the save click handler to ensure it works
        $('#btnSave').click(function () {
            const name = $('#txtHotelName').val();
            const location = $('#txtLocation').val();
            const price = $('#txtPrice').val();
            const rating = $('#txtRating').val();
            const status = $('#txtStatus').val();
            
            if(!name || !location || !price) return alert("Fill all fields");

            let hotels = JSON.parse(localStorage.getItem('Hotels') || '[]');
            hotels.push({ id: crypto.randomUUID(), name, location, price, rating: parseInt(rating), status });
            localStorage.setItem('Hotels', JSON.stringify(hotels));
            
            $('#txtHotelName, #txtLocation, #txtPrice').val('');
            loadHotels();
        });

        $(document).ready(loadHotels);
    </script>
</body>
</html>
